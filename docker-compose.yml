services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - CORS_ORIGINS=http://localhost:3000
      - AUTO_SEED=1

  frontend:
    build:
      context: ./frontend
      args:
        # Inlined into the client bundle at build time; the browser talks to the
        # backend on the host, so use localhost here.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
